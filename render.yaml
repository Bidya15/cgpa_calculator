services:
  # 1. Backend Web Service (Using Docker)
  - type: web
    name: unicalc-backend
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: Dockerfile
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: unicalc-db
          property: jdbcInternalUrl
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: unicalc-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: unicalc-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
      - key: APP_JWT_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        value: 414100923470-q5al9v0ogrp49sl9sjbvrfipj1e0tr2h.apps.googleusercontent.com

  # 2. Frontend Static Site (Using Docker/Nginx)
  - type: web # Changed from static to web to support Docker
    name: unicalc-frontend
    env: docker
    plan: free
    rootDir: frontend
    dockerfilePath: Dockerfile
    envVars:
      - key: VITE_API_BASE_URL
        value: https://unicalc-backend.onrender.com/api

databases:
  - name: unicalc-db
    plan: free
    databaseName: unicalc_db
    user: unicalc_user
